name: Build pptx

on: 
  push:
  pull_request:


jobs:
  build_pptx:

    runs-on: ubuntu-22.04
    strategy:
      matrix:
        mirte-type: [lite]
    # container:
    #   image: althack/ros2:rolling-dev
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt update
          wget https://github.com/RedHatOfficial/Overpass/releases/download/v3.0.5/overpass-3.0.5.zip
          unzip overpass-3.0.5.zip
          sudo cp Overpass-3.0.5/desktop-fonts/* /usr/local/share/fonts -r
          fc-cache -f -v
          sudo apt install python3-venv zip libreoffice npm -y
          cd ${{ matrix.mirte-type }}/
          python3 -m venv sphinx-env
          . sphinx-env/bin/activate
          pip install -r requirements.txt
          sudo npm cache clean -f
          sudo npm install -g n
          sudo n stable
          npm install -g decktape
          playwright install-deps
          playwright install
          sed -i '/fonts.googleapis/d' _sass/custom.scss
          sed -i 's/Overpass/Liberation Sans/g' _sass/custom.scss
          sed -i 's/Livvic/Liberation Sans/g' _sass/custom.scss
          cat _sass/custom.scss
      - name: Build the presentation
        run: |
          cd ${{ matrix.mirte-type }}/
          . sphinx-env/bin/activate
          make revealjs
          cd _build/revealjs
          zip -r ../../revealjs.zip .
          decktape --chrome-arg=--no-sandbox ./index.html ../../slides_${{ matrix.mirte-type }}.pdf
          cd ../../
          soffice --infilter="impress_pdf_import" --convert-to pptx slides_${{ matrix.mirte-type }}.pdf
      # - name: Archive production artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: dist
      #     path: |
      #       _build/revealjs
      - name: Archive production artifacts for act
        uses: actions/upload-artifact@v7
        with:
          name: act_dist
          path: |
            # revealjs.zip
            ${{ matrix.mirte-type }}/slides_${{ matrix.mirte-type }}.pdf
            ${{ matrix.mirte-type }}/slides_${{ matrix.mirte-type }}.pptx
      - name: Push to release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
            files: |
              ${{ matrix.mirte-type }}/slides_${{ matrix.mirte-type }}.pdf
              ${{ matrix.mirte-type }}/slides_${{ matrix.mirte-type }}.pptx
            generate_release_notes: true
